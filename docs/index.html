<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engleesh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Engleesh</h1>
        </header>

        <div class="input-row">
            <input type="text" id="wordInput" placeholder="Введите слово на английском или русском…" autocomplete="off">
            <button id="addBtn" onclick="addWord()">Добавить</button>
        </div>

        <div id="status" class="status"></div>

        <div class="mode-bar">
            <label><input type="checkbox" onchange="setMode('ru', this.checked)"><span class="toggle"></span>Скрыть перевод</label>
            <label><input type="checkbox" onchange="setMode('en', this.checked)"><span class="toggle"></span>Скрыть английский</label>
        </div>

        <div class="toolbar" id="toolbar">
            <button class="toolbar-btn" id="menuBtn" onclick="toggleMenu()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <button class="toolbar-btn primary" id="selectBtn" onclick="toggleSelectMode()">Выбрать</button>
            <div class="menu-dropdown hidden" id="menuDropdown">
                <button onclick="createFolder()">Создать папку</button>
            </div>
        </div>

        <div class="tabs" id="tabsBar">
            <button class="tab active" onclick="switchTab('all')">Все слова</button>
            <button class="tab" onclick="switchTab('mistakes')">Ошибки</button>
            <button class="tab" onclick="switchTab('folders')">Папки</button>
        </div>

        <div class="table-header" id="tableHeader">
            <span class="col-en">Английский</span>
            <span class="col-tr">Транскрипция</span>
            <span class="col-ru">Русский</span>
            <span class="col-actions"></span>
        </div>

        <div id="wordList" class="word-list"></div>
        <div id="emptyMsg" class="empty-msg">Пока нет слов. Добавьте первое слово выше!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
