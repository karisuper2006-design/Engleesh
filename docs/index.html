<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engleesh — Personal Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Engleesh</h1>
            <p class="subtitle">Personal dictionary & trainer</p>
        </header>

        <div class="input-row">
            <input type="text" id="wordInput" placeholder="Type a word in English or Russian…" autocomplete="off">
            <button id="addBtn" onclick="addWord()">Add</button>
        </div>

        <div id="status" class="status"></div>

        <div class="mode-bar">
            <span class="mode-label">Self-check:</span>
            <label><input type="radio" name="mode" value="show_all" checked onchange="setMode(this.value)"> Show all</label>
            <label><input type="radio" name="mode" value="hide_ru" onchange="setMode(this.value)"> Hide translation</label>
            <label><input type="radio" name="mode" value="hide_en" onchange="setMode(this.value)"> Hide original</label>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('all')">All words</button>
            <button class="tab" onclick="switchTab('mistakes')">Mistakes</button>
        </div>

        <div class="table-header">
            <span class="col-en">English</span>
            <span class="col-tr">Transcription</span>
            <span class="col-ru">Russian</span>
            <span class="col-actions"></span>
        </div>

        <div id="wordList" class="word-list"></div>
        <div id="emptyMsg" class="empty-msg">No words yet. Add your first word above!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
